name: Bug Report
description: Report a problem with QK4. Every field feeds automated triage — the more precise, the faster the fix.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. New issues are scanned automatically:
        the required fields below are parsed to route your report to the right component
        and start an initial investigation, so please fill them out completely.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the problem.
      placeholder: RX audio drops out for ~2 seconds after releasing PTT.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps, one per line. Include mode, band, and any relevant settings.
      placeholder: |
        1. Connect to K4 over local network
        2. Switch to CW mode on 40m
        3. Key PTT with the footswitch, then release
        4. Listen to RX audio for the next few seconds
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: RX audio resumes immediately after PTT release.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: RX audio is silent for about 2 seconds, then recovers.
    validations:
      required: true

  - type: input
    id: qk4-version
    attributes:
      label: QK4 Version
      description: Shown in the About dialog (e.g. 0.2.0, or dev-a8059cc for development builds).
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux / Raspberry Pi
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "macOS 15.5 / Windows 11 24H2 / Raspberry Pi OS (Trixie)"
    validations:
      required: true

  - type: dropdown
    id: connection
    attributes:
      label: Radio Connection
      options:
        - Local network (LAN)
        - Remote (internet / VPN)
        - Not applicable — bug does not involve a radio connection
    validations:
      required: true

  - type: input
    id: k4-firmware
    attributes:
      label: K4 Firmware Version
      description: From the K4 (MENU → FW REVS). Enter "Unknown" if you can't check.
      placeholder: "R31"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Pick the closest match — this routes the issue to the right component.
      options:
        - Audio (RX/TX, PTT, latency, devices)
        - CW keying (paddle, keyer, sidetone, KPOD, HaliKey)
        - Spectrum / waterfall display
        - Connection / network (connect, disconnect, stalls)
        - UI (buttons, popups, layout, settings)
        - Hardware devices (KPOD, HaliKey, other USB)
        - CAT integration (WSJT-X, logging software)
        - DX cluster
        - KPA1500 amplifier
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Output / Error Messages
      description: Paste any relevant console output or error text. Leave blank if none.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, frequency/mode where it happens, how often it occurs, anything else useful.
    validations:
      required: false
