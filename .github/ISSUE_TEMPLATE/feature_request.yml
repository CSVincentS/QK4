name: Feature Request
description: Suggest a new feature or improvement. Structured requests are triaged automatically and prioritized faster.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        New requests are scanned automatically: the fields below are parsed to identify
        which parts of QK4 the feature would touch and to start an initial feasibility
        pass, so please be specific about the problem you're solving.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What are you trying to do that QK4 doesn't support today? Describe the operating scenario, not just the missing button.
      placeholder: When running split during a DX pileup, I need to see both VFO passbands on the panadapter at the same time so I can place my TX signal precisely.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How you imagine it working. Rough is fine — behavior matters more than pixel placement.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Pick the closest match for where this feature would live.
      options:
        - Audio (RX/TX, PTT, devices)
        - CW keying (paddle, keyer, sidetone)
        - Spectrum / waterfall display
        - Connection / network
        - UI (buttons, popups, layout, settings)
        - Hardware devices (KPOD, HaliKey, other USB)
        - CAT integration (WSJT-X, logging software)
        - DX cluster
        - KPA1500 amplifier
        - Other / new area
    validations:
      required: true

  - type: checkboxes
    id: platforms
    attributes:
      label: Platforms
      description: Which platforms does this matter on?
      options:
        - label: macOS
        - label: Windows
        - label: Linux / Raspberry Pi
        - label: All platforms / no platform-specific behavior

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Workarounds you use today, or other ways this could be solved.
    validations:
      required: false
