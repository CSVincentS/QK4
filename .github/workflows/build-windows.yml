name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-bincache

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Cache vcpkg binary packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: vcpkg-bincache
          # Keyed on the manifest so a dependency or baseline bump rebuilds
          # instead of restoring stale binaries.
          key: vcpkg-win-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-win-

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730
        with:
          # 6.11 pending: its restructured download repository isn't supported
          # by the installer tooling yet; bump when a release handles it.
          version: '6.10.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qtshadertools qtserialport'
          cache: true

      - name: Setup vcpkg
        # Fetch first so the builtin-baseline commit in vcpkg.json is always
        # present even when the runner image's vcpkg checkout is older.
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
          cd C:\vcpkg
          git fetch origin
          .\bootstrap-vcpkg.bat

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with:
          arch: x64

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696

      - name: Configure CMake
        # Manifest mode: dependencies from vcpkg.json are installed into
        # build/vcpkg_installed during configure.
        run: |
          cmake -B build -G Ninja -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build

      - name: Verify executable
        run: |
          if (Test-Path build/QK4.exe) {
            Write-Host "Build successful"
            exit 0
          } else {
            Write-Host "Build failed - executable not found"
            exit 1
          }

      - name: Bundle dependencies
        run: |
          mkdir QK4-windows
          copy build\QK4.exe QK4-windows\

          windeployqt --release --no-translations QK4-windows\QK4.exe

          # Bundle the MSVC runtime DLLs app-locally so users never install a
          # redistributable by hand. (windeployqt --compiler-runtime ships the
          # vc_redist installer instead, which defeats the purpose.)
          $crtDir = Get-ChildItem "$env:VCToolsRedistDir\x64" -Directory -Filter "Microsoft.VC1*.CRT" | Select-Object -First 1
          Copy-Item "$($crtDir.FullName)\*.dll" QK4-windows\

          copy build\vcpkg_installed\x64-windows\bin\opus.dll QK4-windows\
          copy build\vcpkg_installed\x64-windows\bin\hidapi.dll QK4-windows\
          copy build\vcpkg_installed\x64-windows\bin\libssl-3-x64.dll QK4-windows\
          copy build\vcpkg_installed\x64-windows\bin\libcrypto-3-x64.dll QK4-windows\
          copy build\vcpkg_installed\x64-windows\bin\libusb-1.0.dll QK4-windows\

      - name: Verify VC++ runtime bundled
        run: |
          $runtime = Get-ChildItem QK4-windows -Filter "vcruntime140*.dll"
          if (-not $runtime) {
            Write-Host "VC++ runtime DLLs missing from bundle"
            exit 1
          }
          Get-ChildItem QK4-windows -Filter "*.dll" | Select-Object Name

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: QK4-windows
          path: QK4-windows/
          retention-days: 7
