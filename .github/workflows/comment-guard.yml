name: Comment Guard

# Deterministic moderation of issue/PR comments and new issue bodies.
# GitHub has no setting to disable file attachments on issues, so this
# is the enforcement substitute (added after a malware-spam comment on
# issue #113 disguised an external janingxia[.]com URL as a .zip
# attachment — the Lumma-stealer "fake fix" campaign pattern).
#
# Two rules, applied only to authors WITHOUT write access:
#   A. A markdown link whose display text looks like an archive or
#      executable filename but whose URL points outside GitHub
#      (disguised download — hidden as spam).
#   B. A real GitHub-hosted attachment upload with an archive or
#      executable extension (zip uploads are not accepted from
#      non-maintainers — logs go in code blocks or .txt).
#
# Matching comments are minimized via GraphQL and answered with one
# explanatory reply. Issue bodies can't be minimized, so those get a
# maintainer ping instead. Pure bash + gh — no Claude session, so the
# issue_comment trigger carries no quota/abuse risk (unlike the triage
# workflow, which must stay on `issues: opened` only).
# Kill switch: set the repo Actions variable COMMENT_GUARD_ENABLED to
# 'false' to pause without a commit.

on:
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, edited]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: comment-guard-${{ github.event.comment.id || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  guard:
    if: vars.COMMENT_GUARD_ENABLED != 'false' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Body and author data come in via env, never shell interpolation —
      # comment text is attacker-controlled.
      - name: Scan for disguised or uploaded archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BODY: ${{ github.event.comment.body || github.event.issue.body }}
          AUTHOR_ASSOC: ${{ github.event.comment.author_association || github.event.issue.author_association }}
          COMMENT_NODE_ID: ${{ github.event.comment.node_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          case "$AUTHOR_ASSOC" in
            OWNER|MEMBER|COLLABORATOR) echo "Author has write access - skipping."; exit 0 ;;
          esac

          EXT='\.(zip|rar|7z|exe|msi|scr|bat|cmd|dmg|iso|jar)'
          verdict=""

          # Rule A: file-named markdown link with a non-GitHub target.
          # Catches protocol-relative (//host) and percent-encoded hosts,
          # since neither starts with an allowed prefix.
          while IFS= read -r link; do
            [ -z "$link" ] && continue
            url="${link##*](}"
            url="${url%)}"
            case "$url" in
              https://github.com/*|https://objects.githubusercontent.com/*) ;;
              *) verdict="a disguised download link (file-styled link pointing outside GitHub)" ;;
            esac
          done < <(grep -oiE "\[[^]]*${EXT}[^]]*\]\([^)]+\)" <<< "$BODY" || true)

          # Rule B: genuine GitHub attachment upload with a risky extension
          # (current user-attachments URLs and the legacy per-repo form).
          if [ -z "$verdict" ] && grep -qiE "https://github\.com/(user-attachments/files|${REPO}/files)/[^)[:space:]]*${EXT}" <<< "$BODY"; then
            verdict="an archive/executable attachment"
          fi

          if [ -z "$verdict" ]; then
            echo "No match - nothing to do."
            exit 0
          fi
          echo "Flagged: $verdict"

          if [ -n "$COMMENT_NODE_ID" ]; then
            gh api graphql \
              -f query='mutation($id: ID!) { minimizeComment(input: {subjectId: $id, classifier: SPAM}) { minimizedComment { isMinimized } } }' \
              -f id="$COMMENT_NODE_ID"
            gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" -f body="$(printf '%s\n\n%s\n\n%s' \
              "⚠️ The comment above was hidden automatically because it contains ${verdict}." \
              "For safety, QK4 does not accept archive or executable downloads in issue comments from non-maintainers — a widespread malware campaign posts fake \"fix\" zips to GitHub issues. Please paste logs as text in a code block (or attach a plain .txt file). If your file was legitimate, a maintainer will review and restore the comment." \
              "— automated comment guard")"
          else
            gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" -f body="$(printf '%s\n\n%s' \
              "⚠️ Maintainer review needed: this issue's description contains ${verdict}. Issue bodies cannot be hidden automatically — please review and edit if malicious. cc @${REPO%%/*}" \
              "— automated comment guard")"
          fi
