name: Lint & Test

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install clang-format
        # Pinned major so the formatting baseline can't shift when the runner
        # image's default clang-format changes. Bumping this requires a
        # repo-wide reformat commit first.
        run: sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find src tests -name '*.cpp' -o -name '*.h' | xargs clang-format-18 --dry-run --Werror

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Qt 6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-base-private-dev \
            qt6-multimedia-dev qt6-serialport-dev qt6-svg-dev \
            qt6-shadertools-dev \
            libopus-dev libhidapi-dev libusb-1.0-0-dev libssl-dev libudev-dev libasound2-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build tests
        # `qk4_tests` is a CMake aggregate target defined in tests/CMakeLists.txt
        # that depends on every test_* executable. Adding a new test only requires
        # an `add_executable(test_foo ...)` — no parallel edit to this workflow.
        # test_catserver remains the Phase 0.7 regression gate protecting the
        # RadioState public API contract used by the CAT server (see
        # docs/radiostate-catserver-api-contract.md).
        run: cmake --build build --target qk4_tests

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  sanitizer-tests:
    # Phase 0.10 — ASAN + UBSAN build of the test binaries, running on
    # every push. Originally added to guard the RadioState subsystem
    # split and MainWindow controller extraction against use-after-free
    # and UB that unit tests would otherwise miss. Post-refactor
    # (Phase 5.4) decision: keep it. Cost is one Ubuntu job + ~2 min;
    # it catches a bug class regular tests miss.
    # Scheduled deep runs (including TSan) live in sanitizers.yml.
    name: Sanitizer Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Qt 6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-base-private-dev \
            qt6-multimedia-dev qt6-serialport-dev qt6-svg-dev \
            qt6-shadertools-dev \
            libopus-dev libhidapi-dev libusb-1.0-0-dev libssl-dev libudev-dev libasound2-dev

      - name: Configure CMake (sanitizers on for tests)
        run: cmake -B build-san -DCMAKE_BUILD_TYPE=Debug -DQK4_TESTS_SANITIZE=ON

      - name: Build instrumented tests
        # See unit-tests job comment for why this uses the qk4_tests aggregate.
        run: cmake --build build-san --target qk4_tests

      - name: Run instrumented tests
        # UBSAN_OPTIONS=halt_on_error=1 makes CI fail fast on any UB detection.
        # ASAN is already set to abort via -fno-sanitize-recover=all in CMake.
        env:
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
        run: ctest --test-dir build-san --output-on-failure
