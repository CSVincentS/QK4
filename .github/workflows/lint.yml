name: Lint & Test

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  clang-format:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src tests -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-base-private-dev \
            qt6-multimedia-dev qt6-serialport-dev qt6-svg-dev \
            qt6-shadertools-dev \
            libopus-dev libhidapi-dev libssl-dev libasound2-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build tests
        # test_catserver is the Phase 0.7 regression gate protecting the
        # RadioState public API contract used by the CAT server (see
        # docs/radiostate-catserver-api-contract.md). It must stay green
        # across any RadioState refactor.
        run: cmake --build build --target test_radiostate test_radiostate_registry test_radioutils test_protocol test_catserver test_dxcluster

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
