name: Scheduled Sanitizers

# Weekly deep sanitizer pass over the test suite. The fast ASAN/UBSAN gate
# on every push lives in lint.yml; this adds ThreadSanitizer (which cannot
# coexist with ASAN) and turns failures into a tracked GitHub issue instead
# of an unread red run: one open tracking issue per sanitizer kind (found by
# label), with a comment appended per failing run — no duplicate issues.

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sanitize:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan-ubsan
            cmake_args: -DCMAKE_BUILD_TYPE=Debug -DQK4_TESTS_SANITIZE=ON
            cxxflags: ''
            ldflags: ''
          - name: tsan
            # TSan needs optimized-but-symbolized builds; flags go through the
            # environment so every standalone test executable gets them.
            cmake_args: -DCMAKE_BUILD_TYPE=RelWithDebInfo
            cxxflags: '-fsanitize=thread -g -fno-omit-frame-pointer'
            ldflags: '-fsanitize=thread'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Qt 6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-base-private-dev \
            qt6-multimedia-dev qt6-serialport-dev qt6-svg-dev \
            qt6-shadertools-dev \
            libopus-dev libhidapi-dev libusb-1.0-0-dev libssl-dev libudev-dev libasound2-dev

      - name: Configure CMake
        env:
          CXXFLAGS: ${{ matrix.cxxflags }}
          LDFLAGS: ${{ matrix.ldflags }}
        run: cmake -B build-san ${{ matrix.cmake_args }}

      - name: Build instrumented tests
        run: cmake --build build-san --target qk4_tests

      - name: Run instrumented tests
        id: run
        shell: bash
        env:
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        # Capture the exit code instead of failing here so the reporting steps
        # below always run; the final step restores the red status.
        run: |
          set +e
          ctest --test-dir build-san --output-on-failure 2>&1 | tee sanitizer.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Extract failure report
        if: steps.run.outputs.exit_code != '0'
        id: report
        shell: bash
        # 45KB cap keeps the report under the issue-body size limit.
        run: |
          grep -A 80 "SUMMARY: " sanitizer.log | head -c 45000 > report.txt || true
          if [ ! -s report.txt ]; then
            tail -c 45000 sanitizer.log > report.txt
          fi
          FIRST_SUMMARY=$(grep -m1 "SUMMARY: " sanitizer.log || echo "no-summary-line")
          echo "fingerprint=$(printf '%s' "$FIRST_SUMMARY" | sha256sum | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Upload full log
        if: steps.run.outputs.exit_code != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sanitizer-log-${{ matrix.name }}-${{ github.run_id }}
          path: sanitizer.log
          retention-days: 30

      - name: Report to tracking issue
        if: steps.run.outputs.exit_code != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          SANITIZER_KIND: ${{ matrix.name }}
          FINGERPRINT: ${{ steps.report.outputs.fingerprint }}
        with:
          script: |
            const fs = require('fs');
            const kind = process.env.SANITIZER_KIND;
            const fingerprint = process.env.FINGERPRINT;
            const report = fs.readFileSync('report.txt', 'utf8');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Scheduled \`${kind}\` run failed.`,
              '',
              `- Run: ${runUrl}`,
              `- Failure fingerprint: \`${fingerprint}\` (first SUMMARY line; same fingerprint = same crash)`,
              '- Full log: 30-day artifact on the run linked above',
              '',
              '```',
              report,
              '```',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: `sanitizer,${kind}`,
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
              core.info(`Appended to tracking issue #${issues[0].number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[sanitizer] ${kind} failures in scheduled run`,
                labels: ['sanitizer', kind],
                body,
              });
              core.info(`Opened tracking issue #${issue.number}`);
            }

      - name: Fail the job on sanitizer findings
        if: steps.run.outputs.exit_code != '0'
        run: exit 1
