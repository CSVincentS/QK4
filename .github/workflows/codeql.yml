name: CodeQL

# Static security/bug analysis of the C++ sources. Findings appear under
# Security -> Code scanning; nothing blocks merges. C++ analysis requires a
# full build, so doc-only changes are skipped and a weekly scheduled run
# guarantees coverage regardless of push activity.

on:
  push:
    branches: [main, development]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, development]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze C++
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev \
            libopus-dev libhidapi-dev libusb-1.0-0-dev libssl-dev libudev-dev libasound2-dev

      - name: Install Qt
        # The distro Qt is too old to build the full app (the GPU panadapter
        # needs Qt 6.7+), and analyzing only the test targets would leave the
        # app sources unscanned.
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730
        with:
          version: '6.10.*'
          host: 'linux'
          target: 'desktop'
          modules: 'qtmultimedia qtshadertools qtserialport'
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a
        with:
          languages: c-cpp
          build-mode: manual

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a
        with:
          category: '/language:c-cpp'
