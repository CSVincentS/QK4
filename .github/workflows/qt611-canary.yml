name: Qt 6.11 Canary

# Windows CI is held at Qt 6.10 because Qt 6.11 restructured its download
# repository and the installer tooling can't fetch it yet. This monthly
# canary attempts a real Qt 6.11 install on a Windows runner; the first
# time it succeeds, it opens a tracking issue so the version pins in
# build-windows.yml / build-development.yml / release.yml get bumped.
# While the install keeps failing, the workflow exits green and silent.
#
# Delete this workflow after the Qt 6.11 bump lands.

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Attempt Qt 6.11 install
        id: probe
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730
        continue-on-error: true
        with:
          version: '6.11.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qtshadertools qtserialport'
          cache: false

      - name: Report result
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          PROBE_OUTCOME: ${{ steps.probe.outcome }}
        with:
          script: |
            if (process.env.PROBE_OUTCOME !== 'success') {
              core.info('Qt 6.11 is still not installable — expected; nothing to do.');
              return;
            }
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'qt-canary',
            });
            if (issues.length > 0) {
              core.info(`Tracking issue #${issues[0].number} already open — nothing to do.`);
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The monthly canary just installed Qt 6.11 (`win64_msvc2022_64` with qtmultimedia/qtshadertools/qtserialport) successfully on a Windows runner — the installer tooling now supports it.',
              '',
              `Run: ${runUrl}`,
              '',
              'To bump Windows CI from Qt 6.10 to 6.11:',
              '1. Change `version: \'6.10.*\'` to `version: \'6.11.*\'` and drop the "6.11 pending" comment in:',
              '   - `.github/workflows/build-windows.yml`',
              '   - `.github/workflows/build-development.yml`',
              '   - `.github/workflows/release.yml`',
              '2. Consider the same bump for the CodeQL workflow (`codeql.yml`, Linux Qt).',
              '3. Validate with a `build-development.yml` dispatch and inspect the Windows artifact.',
              '4. Delete `.github/workflows/qt611-canary.yml` — its job is done.',
            ].join('\n');
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Qt 6.11 is now installable on Windows CI — bump the version pins',
              labels: ['qt-canary'],
              body,
            });
            core.info(`Opened tracking issue #${issue.number}`);
